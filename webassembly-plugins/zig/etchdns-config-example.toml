# Example EtchDNS configuration file showing how to use the hooks plugin

# Basic configuration
listen_addresses = ["127.0.0.1:53", "[::1]:53"]
upstream_servers = ["1.1.1.1:53", "8.8.8.8:53"]
cache_size = 10000
server_timeout = 2

# Hooks configuration
# Path to the compiled WebAssembly plugin
hooks_wasm_file = "/path/to/etchdns-plugin.wasm"

# Set to true if the plugin needs WASI system calls
hooks_wasm_wasi = false

# Other configuration options
log_level = "info"
